  function setStatus(t){ var s=document.getElementById("status"); if(s) s.textContent=t; }
  function decode(b64){ const bin=atob(b64); const l=bin.length; const bytes=new Uint8Array(l); for(let i=0;i<l;i++) bytes[i]=bin.charCodeAt(i); return new TextDecoder().decode(bytes); }
  async function sha256HexLocal(str){ const enc=new TextEncoder(); const data=enc.encode(str); const h=await crypto.subtle.digest("SHA-256", data); return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join(""); }
  function render(html){ var ifr=document.getElementById("content"); try{ ifr.srcdoc=html; }catch(e){ var d=ifr.contentWindow.document; d.open(); d.write(html); d.close(); } }
  function hideUnlock(){ var card=document.getElementById("unlockCard"); if(card){ card.style.display="none"; } var wrap=document.getElementById("uiWrap"); if(wrap){ wrap.style.gap="0"; } }
  if(!storedHash){ render(decode(payloadB64)); return; }
  document.getElementById("go").addEventListener("click", async function(){
    setStatus("Checking password...");
    try{ var p=document.getElementById("pw").value||""; var h=await sha256HexLocal(p); if(h!==storedHash){ setStatus("Incorrect password."); return; } setStatus("Password ok — rendering..."); hideUnlock(); render(decode(payloadB64)); }
    catch(e){ setStatus("Error: "+(e&&e.message?e.message:String(e))); }
  });
  document.getElementById("pw").addEventListener("keyup", function(ev){ if(ev.key==="Enter") document.getElementById("go").click(); });
})();</script>
