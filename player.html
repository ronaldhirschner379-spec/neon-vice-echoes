<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neon Vice Echoes · Player</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none}
:root{
  --bg:#050612;--panel:#0e1228;
  --accent:#00FFFF;--rose:#FF00FF;--teal:#00CED1;
  --text:#f0eeff;--soft:#a09cc0;--border:rgba(0,206,209,0.2);
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px}
.site-header{width:100%;max-width:860px;display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-bars{display:flex;align-items:flex-end;gap:3px;height:26px}
.logo-bars span{display:block;width:5px;border-radius:2px}
.logo-bars span:nth-child(1){height:10px;background:var(--accent)}
.logo-bars span:nth-child(2){height:16px;background:var(--teal)}
.logo-bars span:nth-child(3){height:22px;background:var(--rose)}
.logo-bars span:nth-child(4){height:26px;background:var(--accent)}
.logo-text{font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent)}
.logo-sub{font-size:10px;color:var(--soft);letter-spacing:0.08em;margin-top:2px}
.free-badge{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid var(--teal);color:var(--teal);letter-spacing:0.1em;text-transform:uppercase}
.album-hero{width:100%;max-width:860px;border-radius:14px;background:linear-gradient(135deg,#0a0020,#001a1a);border:1px solid var(--border);padding:24px;margin-bottom:20px;display:flex;gap:20px;align-items:flex-start}
.album-cover{width:90px;height:90px;border-radius:10px;background:linear-gradient(145deg,#1a0030,#001a20);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.album-cover svg{width:52px;height:52px}
.album-info{flex:1;min-width:0}
.album-title{font-size:19px;font-weight:500;color:var(--text);margin-bottom:3px}
.album-subtitle{font-size:11px;color:var(--teal);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px}
.album-desc{font-size:13px;color:var(--soft);line-height:1.6;margin-bottom:12px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid rgba(0,255,255,0.25);color:var(--accent);letter-spacing:0.06em}
.tag.alt{border-color:rgba(255,0,255,0.25);color:var(--rose)}
.buy-strip{width:100%;max-width:860px;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.buy-btn{display:flex;flex-direction:column;align-items:center;padding:13px;border-radius:12px;border:1px solid;cursor:pointer;text-decoration:none;transition:background 0.15s}
.buy-btn.mp3{border-color:var(--teal);color:var(--teal);background:rgba(0,206,209,0.06)}
.buy-btn.mp3:hover{background:rgba(0,206,209,0.14)}
.buy-btn.flac{border-color:var(--rose);color:var(--rose);background:rgba(255,0,255,0.06)}
.buy-btn.flac:hover{background:rgba(255,0,255,0.14)}
.buy-price{font-size:20px;font-weight:500}
.buy-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;opacity:0.8}
.buy-hint{font-size:10px;opacity:0.55;margin-top:1px}
.section-label{width:100%;max-width:860px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--soft);margin-bottom:10px}
.track{width:100%;max-width:860px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:7px;cursor:pointer;transition:border-color 0.15s}
.track:hover{border-color:var(--teal)}
.track.active{border-color:var(--accent)}
.track-top{display:flex;align-items:center;gap:12px}
.track-num{font-size:11px;color:var(--soft);width:20px;flex-shrink:0;letter-spacing:0.05em}
.track-meta{flex:1;min-width:0}
.track-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-mood{font-size:11px;color:var(--soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.play-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--teal);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s}
.play-btn:hover{background:rgba(0,206,209,0.15)}
.play-btn svg{width:12px;height:12px;fill:var(--teal)}
.track.active .play-btn{border-color:var(--accent)}
.track.active .play-btn svg{fill:var(--accent)}
.expand{display:none;margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}
.track.active .expand{display:block}
.expand-about{font-size:12px;color:var(--soft);line-height:1.6;margin-bottom:9px}
.prog-bar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--accent));border-radius:2px}
.prog-info{display:flex;justify-content:space-between;font-size:10px;color:var(--soft);margin-top:4px}
.expand-note{font-size:10px;color:var(--soft);opacity:0.5;font-style:italic;margin-top:5px}
.loading{color:var(--soft);font-size:14px;text-align:center;padding:3rem;letter-spacing:0.1em}
.error{color:#ff6b6b;font-size:13px;text-align:center;padding:2rem}
.footer{margin-top:36px;font-size:11px;color:var(--soft);opacity:0.5;letter-spacing:0.07em}
@media(max-width:580px){.album-hero{flex-direction:column}.album-cover{width:70px;height:70px}}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo-wrap">
    <div class="logo-bars"><span></span><span></span><span></span><span></span></div>
    <div>
      <div class="logo-text">Neon Vice Echoes</div>
      <div class="logo-sub">by Ronald Hirschner</div>
    </div>
  </div>
  <div class="free-badge">Free Preview</div>
</header>

<div id="app"><div class="loading">Loading album data...</div></div>
<div class="footer" id="footer"></div>

<script>
const REPO = 'https://ronaldhirschner379-spec.github.io/neon-vice-echoes/';

function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

function parseMD(text){
  const lines = text.split('\n');
  const album = {title:'',subtitle:'',description:'',tags:[],price_mp3:'',price_flac:'',buy_link:'',audio_folder:'',tracks:[]};
  let currentTrack = null;
  let inAbout = false;

  for(let i=0; i<lines.length; i++){
    const line = lines[i];

    if(line.startsWith('# ')){
      album.title = line.slice(2).trim();
      continue;
    }
    if(line.startsWith('## ')){
      if(currentTrack) album.tracks.push(currentTrack);
      const parts = line.slice(3).trim().split('·');
      currentTrack = {num: parts[0]?.trim(), name: parts[1]?.trim()||parts[0]?.trim(), mood:'', about:''};
      inAbout = false;
      continue;
    }
    if(currentTrack){
      if(line.startsWith('mood:')){currentTrack.mood = line.slice(5).trim(); continue;}
      if(line.startsWith('about:')){currentTrack.about = line.slice(6).trim(); inAbout=true; continue;}
      if(inAbout && line.trim() && !line.includes(':')) currentTrack.about += ' '+line.trim();
      continue;
    }
    if(line.startsWith('subtitle:')){ album.subtitle = line.slice(9).trim(); continue;}
    if(line.startsWith('description:')){ album.description = line.slice(12).trim(); continue;}
    if(line.startsWith('tags:')){ album.tags = line.slice(5).split(',').map(t=>t.trim()); continue;}
    if(line.startsWith('price_mp3:')){ album.price_mp3 = line.slice(10).trim(); continue;}
    if(line.startsWith('price_flac:')){ album.price_flac = line.slice(11).trim(); continue;}
    if(line.startsWith('buy_link:')){ album.buy_link = line.slice(9).trim(); continue;}
    if(line.startsWith('audio_folder:')){ album.audio_folder = line.slice(13).trim(); continue;}
  }
  if(currentTrack) album.tracks.push(currentTrack);
  return album;
}

function fmt(s){
  const m=Math.floor(s/60), sec=Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

let activeIdx=null, audioEl=null, rafId=null;

function buildPlayer(album){
  const audioBase = REPO + encodeURIComponent(album.audio_folder) + '/';
  const tagHtml = album.tags.map((t,i)=>`<span class="tag${i%2?' alt':''}">${t}</span>`).join('');
  const tracksHtml = album.tracks.map((t,i)=>`
    <div class="track" id="tr-${i}" onclick="toggle(${i},'${audioBase}${t.num.padStart(2,'0')}.mp3')">
      <div class="track-top">
        <div class="track-num">${t.num.padStart(2,'0')}</div>
        <div class="track-meta">
          <div class="track-name">${t.name}</div>
          <div class="track-mood">${t.mood}</div>
        </div>
        <div class="play-btn"><svg id="ic-${i}" viewBox="0 0 12 12"><polygon points="2,1 11,6 2,11"/></svg></div>
      </div>
      <div class="expand">
        <div class="expand-about">${t.about}</div>
        <div class="prog-bar"><div class="prog-fill" id="pf-${i}"></div></div>
        <div class="prog-info"><span id="el-${i}">0:00</span><span id="tot-${i}">—</span></div>
        <div class="expand-note">Preview · Full track after purchase</div>
      </div>
    </div>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="album-hero">
      <div class="album-cover">
        <svg viewBox="0 0 52 52" fill="none">
          <rect x="3" y="32" width="7" height="17" rx="2" fill="#00FFFF" opacity="0.9"/>
          <rect x="13" y="22" width="7" height="27" rx="2" fill="#00CED1" opacity="0.9"/>
          <rect x="23" y="12" width="7" height="37" rx="2" fill="#FF00FF" opacity="0.9"/>
          <rect x="33" y="4"  width="7" height="45" rx="2" fill="#00FFFF" opacity="0.9"/>
          <rect x="43" y="18" width="7" height="31" rx="2" fill="#00CED1" opacity="0.9"/>
        </svg>
      </div>
      <div class="album-info">
        <div class="album-title">${album.title}</div>
        <div class="album-subtitle">${album.subtitle}</div>
        <div class="album-desc">${album.description}</div>
        <div class="tags">${tagHtml}</div>
      </div>
    </div>
    <div class="buy-strip">
      <a class="buy-btn mp3" href="${album.buy_link}" target="_blank">
        <span class="buy-price">$${album.price_mp3}</span>
        <span class="buy-label">MP3 · 160kbps</span>
        <span class="buy-hint">Choose format at checkout</span>
      </a>
      <a class="buy-btn flac" href="${album.buy_link}" target="_blank">
        <span class="buy-price">$${album.price_flac}</span>
        <span class="buy-label">FLAC · Lossless</span>
        <span class="buy-hint">Audiophile quality</span>
      </a>
    </div>
    <div class="section-label">Preview · Full tracks after purchase</div>
    ${tracksHtml}
  `;
  document.getElementById('footer').textContent = '© 2026 · Neon Vice Echoes · Ronald Hirschner · All rights reserved';
  document.title = `Neon Vice Echoes · ${album.title}`;
}

function toggle(i, src){
  if(activeIdx===i){stopAll();return;}
  stopAll();
  activeIdx=i;
  document.getElementById('tr-'+i).classList.add('active');
  document.getElementById('ic-'+i).innerHTML='<rect x="1" y="1" width="4" height="10" rx="1"/><rect x="7" y="1" width="4" height="10" rx="1"/>';
  audioEl=new Audio(src);
  audioEl.play().catch(()=>{});
  audioEl.addEventListener('loadedmetadata',()=>{
    document.getElementById('tot-'+i).textContent=fmt(audioEl.duration);
  });
  audioEl.addEventListener('ended',stopAll);
  tick(i);
}

function tick(i){
  rafId=requestAnimationFrame(()=>{
    if(!audioEl)return;
    const pct=audioEl.duration?(audioEl.currentTime/audioEl.duration)*100:0;
    document.getElementById('pf-'+i).style.width=Math.round(pct)+'%';
    document.getElementById('el-'+i).textContent=fmt(audioEl.currentTime);
    tick(i);
  });
}

function stopAll(){
  cancelAnimationFrame(rafId);
  if(audioEl){audioEl.pause();audioEl=null;}
  if(activeIdx!==null){
    document.getElementById('tr-'+activeIdx)?.classList.remove('active');
    const pf=document.getElementById('pf-'+activeIdx);
    if(pf)pf.style.width='0%';
    const el=document.getElementById('el-'+activeIdx);
    if(el)el.textContent='0:00';
    const ic=document.getElementById('ic-'+activeIdx);
    if(ic)ic.innerHTML='<polygon points="2,1 11,6 2,11"/>';
    activeIdx=null;
  }
}

async function init(){
  const album = getParam('album');
  if(!album){
    document.getElementById('app').innerHTML='<div class="error">No album specified.<br>Usage: player.html?album=album-folder-name</div>';
    return;
  }
  try{
    const res = await fetch(REPO+'albums/'+album+'.md');
    if(!res.ok) throw new Error('Not found');
    const text = await res.text();
    const data = parseMD(text);
    buildPlayer(data);
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="error">Could not load album data.<br><small>${e.message}</small></div>`;
  }
}

init();
</script>
</body>
</html>
